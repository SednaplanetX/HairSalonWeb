<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Tu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="index.html"><img src="https://cdn-icons-png.flaticon.com/128/41/41990.png" alt="Salon Tu Logo">Salon Tu</a></div>
            <ul>
                <li><a href="hair-styles.html">Styles</a></li>
                <li><a href="book-appointment.html">Book Now</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section class="container" id="booking">
        <h2 class="section-title">Book Your Appointment</h2>
        <form class="booking-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="style">Select Style</label>
                <select id="style" name="style" required>
                    <option value="">Choose a style...</option>
                    <option value="modern-bob">Modern Bob - $45</option>
                    <option value="beachy-waves">Beachy Waves - $55</option>
                    <option value="updo">Elegant Updo - $65</option>
                    <option value="undercut">Undercut Design - $50</option>
                    <option value="braids">Beach Braids - $60</option>
                    <option value="crown">Royal Crown - $70</option>
                </select>
            </div>
            <div class="form-group">
                <label for="date">Preferred Date</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="time">Preferred Time</label>
                <input type="time" id="time" name="time" required>
            </div>
            <div class="form-group">
                <label for="notes">Special Requests</label>
                <textarea id="notes" name="notes"></textarea>
            </div>
            <button type="submit" class="btn">Confirm Booking</button>
        </form>
    </section>
    <footer id="contact">
        <p>&copy; 2026 Salon Tu. All rights reserved.</p>
        <p>📍 910 E New York St, Aurora, IL 60505 | 📞 + 1 (630)-859-1437 | ✉️ support@salontu.com</p>
    </footer>
</body>
</html>
